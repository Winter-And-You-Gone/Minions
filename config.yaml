app:
  name: "voice-agent"
  debug: true

audio:
  sample_rate: 16000
  channels: 1
  chunk_ms: 100
  device: 1

asr:
  engine: "mock"
  language: "zh"
  mode: "offline-vad"

  sherpa_onnx:
    enabled: false

    # 模型类型（sense_voice / paraformer / whisper / transducer）
    # 留空时根据 model 文件名自动检测
    type: "sense_voice"
    language: "zh"
    use_itn: true

    # offline recognizer 模型路径
    model_dir: "./models/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-int8-2024-07-17"
    tokens: "./models/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-int8-2024-07-17/tokens.txt"
    model: "./models/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-int8-2024-07-17/model.int8.onnx"

    # 可选：transducer 类模型需要 encoder/decoder/joiner
    encoder: ""
    decoder: ""
    joiner: ""

    # 解码配置
    num_threads: 2
    decoding_method: "greedy_search"
    provider: "cpu"

    # 音频配置（回退到顶层 audio）
    sample_rate: 16000
    channels: 1
    chunk_ms: 100

    # 简单 VAD 分段配置
    vad:
      enabled: true
      rms_threshold: 0.008
      min_speech_ms: 300
      max_speech_ms: 15000
      silence_timeout_ms: 800
      pre_roll_ms: 300

    # 识别结果过滤
    result:
      min_text_length: 1
      ignore_empty: true

intervention:
  min_text_length: 4
  min_asr_confidence: 0.55
  cooldown_seconds: 5
  conversation_timeout_seconds: 60

  thresholds:
    bubble: 15
    judge: 30
    agent: 60

  uncertain_action: "judge"

llm:
  enabled: true
  provider: "openai_compatible"
  api_base: "${LLM_API_BASE}"
  api_key: "${LLM_API_KEY}"
  model: "${LLM_MODEL}"
  timeout_seconds: 30

websocket:
  enabled: true
  host: "127.0.0.1"
  port: 8765

privacy:
  save_audio: false
  save_transcript: false
  local_stt_only: true
